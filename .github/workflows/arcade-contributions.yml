name: 🕹️ Galaga Contribution Game

# ─────────────────────────────────────────────────────────────────
# IMPORTANT: This workflow does NOT regenerate the Galaga SVG
# automatically (the galaga-contribution-graph tool is not on npm).
#
# HOW TO UPDATE THE GALAGA SVG MANUALLY:
#   1. Install locally: npm install -g galaga-contribution-graph
#      (if unavailable, download from https://github.com/Ish-Codes/galaga-contributions)
#   2. Run: galaga-contribution-graph --username AnuragChowdhury --token <YOUR_PAT>
#   3. Commit the output arcade-contributions.svg to the repo root.
#
# This workflow simply verifies the file exists and touches a
# timestamp so GitHub knows the action ran cleanly.
# ─────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Check arcade SVG exists
        run: |
          if [ -f "arcade-contributions.svg" ]; then
            echo "✅ arcade-contributions.svg found ($(wc -c < arcade-contributions.svg) bytes)"
          else
            echo "⚠️  arcade-contributions.svg not found in repo root."
            echo "Please commit the file manually — see workflow comments above."
            exit 1
          fi

      - name: Touch timestamp (keeps workflow green)
        run: |
          echo "Last verified: $(date -u '+%Y-%m-%d %H:%M UTC')" > .arcade-last-run
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add .arcade-last-run
          git diff --staged --quiet || git commit -m "🕹️ Arcade SVG verified [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
