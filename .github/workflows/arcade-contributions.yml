name: Generate Arcade Contribution Game

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install galaga-contribution-graph
        run: npm install -g galaga-contribution-graph

      - name: Generate arcade contributions SVG
        run: |
          galaga-contribution-graph \
            --username AnuragChowdhury \
            --token ${{ secrets.GITHUB_TOKEN }} \
            --output arcade-contributions.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push arcade SVG
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add arcade-contributions.svg
          git diff --staged --quiet || git commit -m "🕹️ Update arcade contribution game [skip ci]"
          git push
