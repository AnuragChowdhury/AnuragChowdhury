name: 🕹️ Galaga Contribution Game

on:
  schedule:
    - cron: "0 2 * * *"      # daily at 02:00 UTC (after snake + 3D)
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate Galaga arcade SVG
        run: npx --yes galaga-contribution-graph \
               --username AnuragChowdhury \
               --token ${{ secrets.GITHUB_TOKEN }} \
               --output arcade-contributions.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & push arcade SVG
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add arcade-contributions.svg
          git diff --staged --quiet || git commit -m "🕹️ Update Galaga arcade game [skip ci]"
          git push
